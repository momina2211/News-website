{# Like button partial — swapped by HTMX #}
<button hx-post="{% url 'articles:article_like' article.slug %}"
        hx-target="#like-container"
        hx-swap="outerHTML"
        {% if not user.is_authenticated %}disabled title="Sign in to like"{% endif %}
        id="like-container"
        class="flex items-center gap-2 px-4 py-2 rounded-full border transition-colors duration-200
               {% if user_liked %}border-red-400 bg-red-50 dark:bg-red-900/20 text-red-600 dark:text-red-400
               {% else %}border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-800 text-gray-600 dark:text-gray-400 hover:border-red-400 hover:text-red-500{% endif %}">
  <svg class="w-5 h-5 {% if user_liked %}fill-red-500{% else %}fill-none stroke-current{% endif %}"
       viewBox="0 0 24 24" stroke-width="2">
    <path stroke-linecap="round" stroke-linejoin="round" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/>
  </svg>
  <span class="text-sm font-medium">{{ article.like_count }}</span>
</button>
