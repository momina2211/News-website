{% for article in articles %}
<div class="bg-white rounded-xl shadow-md overflow-hidden hover:shadow-lg transition-shadow duration-300">
    {% if article.image %}
    <img src="{{ article.image.url }}" alt="{{ article.title }}" class="w-full h-48 object-cover">
    {% else %}
    <div class="w-full h-48 bg-gradient-to-br from-blue-400 to-purple-500 flex items-center justify-center">
        <span class="text-white text-4xl">📰</span>
    </div>
    {% endif %}
    <div class="p-5">
        {% if article.category %}
        <span class="bg-blue-100 text-blue-700 text-xs font-semibold px-2 py-1 rounded-full">{{ article.category.name }}</span>
        {% endif %}
        <h2 class="mt-2 text-lg font-bold text-gray-900 line-clamp-2">
            <a href="{{ article.get_absolute_url }}" class="hover:text-blue-600">{{ article.title }}</a>
        </h2>
        <p class="mt-1 text-gray-500 text-sm line-clamp-3">{{ article.excerpt }}</p>
        <div class="mt-3 flex items-center justify-between text-xs text-gray-400">
            <span>{{ article.author.username }}</span>
            <span>{{ article.published_date|date:"M d, Y" }}</span>
        </div>
    </div>
</div>
{% endfor %}
