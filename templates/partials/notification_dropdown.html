{# Notification dropdown - HTMX powered #}
<div class="relative" x-data="{ open: false }">
    <!-- Notification bell button -->
    <button @click="open = !open" class="relative p-2 text-gray-600 hover:text-gray-900 dark:text-gray-400 dark:hover:text-gray-200 transition-colors">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/>
        </svg>
        <!-- Unread badge -->
        <div id="notification-badge" class="absolute top-0 right-0 bg-red-500 text-white text-xs rounded-full w-5 h-5 flex items-center justify-center font-bold"
             hx-get="/api/notifications/unread_count/"
             hx-trigger="every 30s"
             hx-swap="textContent"
             hx-indicator="none">
        </div>
    </button>

    <!-- Dropdown -->
    <div @click.outside="open = false"
         x-show="open"
         x-transition
         class="absolute right-0 mt-2 w-80 bg-white dark:bg-gray-800 rounded-lg shadow-xl border border-gray-200 dark:border-gray-700 z-50">

        <!-- Header -->
        <div class="flex items-center justify-between p-4 border-b border-gray-200 dark:border-gray-700">
            <h3 class="font-bold text-gray-900 dark:text-white">Notifications</h3>
            <button @click="open = false" class="text-gray-400 hover:text-gray-600">
                <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd"/></svg>
            </button>
        </div>

        <!-- Notifications list -->
        <div id="notifications-list"
             class="max-h-96 overflow-y-auto"
             hx-get="/api/notifications/list_notifications/?limit=10"
             hx-trigger="load"
             hx-swap="innerHTML">

            <div class="p-4 text-center text-gray-500">
                <svg class="animate-spin w-6 h-6 mx-auto" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
                </svg>
            </div>
        </div>

        <!-- Footer -->
        <div class="border-t border-gray-200 dark:border-gray-700 p-3">
            <button hx-post="/api/notifications/mark_as_read/"
                    hx-swap="none"
                    class="w-full text-sm text-blue-600 dark:text-blue-400 hover:underline font-medium">
                Mark all as read
            </button>
        </div>
    </div>
</div>

<!-- Notification item template (returned via HTMX) -->
<script type="text/html" id="notification-item-template">
    <a href="${notification.url}" class="block p-4 border-b border-gray-100 dark:border-gray-700 hover:bg-gray-50 dark:hover:bg-gray-700/50 transition-colors last:border-b-0">
        <div class="flex items-start gap-3">
            <div class="flex-1">
                <p class="text-sm font-medium text-gray-900 dark:text-white">${notification.message}</p>
                <p class="text-xs text-gray-500 dark:text-gray-400 mt-1">
                    ${new Date(notification.created_at).toLocaleDateString()}
                </p>
            </div>
            {% if not notification.is_read %}
            <div class="w-2 h-2 bg-blue-500 rounded-full mt-2"></div>
            {% endif %}
        </div>
    </a>
</script>
